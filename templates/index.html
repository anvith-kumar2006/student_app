<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Student Risk Checker</title>
</head>
<body>

    <h2>Student Performance Checker</h2>

    <form method="POST" action="/predict">
        <input type="text" name="name" placeholder="Enter Name" required><br><br>

        <input type="number" name="attendance" placeholder="Attendance %" required><br><br>

        <input type="number" name="marks" placeholder="Marks" required><br><br>

        <input type="number" step="0.1" name="cgpa" placeholder="CGPA" required><br><br>

        <button type="submit">Check Risk</button>
    </form>

</body>
</html>
